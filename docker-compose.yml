services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: requests-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://10.0.0.54:9090}
      CLIENT_ORIGINS: ${CLIENT_ORIGINS:-http://10.0.0.54:9090,http://localhost:9090,http://127.0.0.1:9090}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      DB_SERVER: ${DB_SERVER:-host.docker.internal}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-Requests}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ENCRYPT: ${DB_ENCRYPT:-false}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
    container_name: requests-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "0.0.0.0:9090:80"
