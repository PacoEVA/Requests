version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/project

commands:
  install_dependencies:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

jobs:
  validate:
    executor: node
    steps:
      - checkout
      - install_dependencies
      - run:
          name: Typecheck and lint
          command: npm run lint --workspaces
      - run:
          name: Tests
          command: npm run test --workspaces
      - run:
          name: Build
          command: npm run build --workspaces
      - run:
          name: Security audit
          command: npm audit --workspaces --audit-level=moderate

workflows:
  validate:
    jobs:
      - validate
